name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          custom_instructions: |
            This is a static front-end project built with HTML, CSS, and vanilla JavaScript.

            There is no backend, build step, or package manager involved.
            All files can be opened directly in the browser via index.html.
            If needed, use the mcp_playwright set of tools to launch a local server and test the app in a browser.

            The project is already deployed and working in production.
            Focus on improving code quality, UI/UX, responsiveness, accessibility, and performance.

            When suggesting changes:
            - Keep the implementation simple and framework-free
            - Do not introduce unnecessary dependencies or build tools
            - Ensure compatibility with modern browsers (Chrome, Edge, Firefox)
            - Prefer clean, readable, and maintainable code

            You may:
            - Refactor HTML, CSS, and JavaScript
            - Improve layout, styling, and responsiveness
            - Fix bugs or edge cases
            - Suggest small enhancements to user experience

            Avoid:
            - Adding Node.js, npm, or build pipelines unless explicitly requested
            - Converting the project to frameworks like React, Vue, etc.

            Assume the app can be tested by opening index.html in a browser.

          mcp_config: |
            {
              "mcpServers": {
                "playwright": {
                  "type": "stdio",
                  "command": "npx",
                  "args": [
                    "@playwright/mcp@latest",
                    "--cdp-endpoint",
                    "http://localhost:9222"
                  ],
                  "env": {}
                }
              }
            }

          allowed_tools: "Bash(npm:*),Bash(sqlite3:*),mcp__playwright__browser_take_screenshot,mcp__playwright__browser_snapshot,mcp__playwright__browser_click,mcp__playwright__browser_navigate,mcp__playwright__browser_fill_form,mcp__playwright__browser_wait_for,mcp__playwright__browser_type,mcp__playwright__browser_press_key,mcp__playwright__browser_evaluate,mcp__playwright__browser_network_requests,mcp__playwright__browser_tabs"
            

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr:*)'

